name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system deps
        # bevy + bevy_kira_audio + bevy_audio probe several native libs at
        # build time via pkg-config on linux. ubuntu-latest runners ship
        # none of these by default. List covers window + audio + input.
        # Adding one here is cheaper than chasing each failure piecemeal.
        # NOTE: keep the entire apt-get command on ONE shell line. YAML
        # line-folding + backslash continuation has bitten us before — the
        # backslash was passed through literally and apt saw a single
        # malformed package name. One line = one shell argv = no surprises.
        run: sudo apt-get update && sudo apt-get install -y libwayland-dev libxkbcommon-dev libx11-dev libasound2-dev libudev-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace